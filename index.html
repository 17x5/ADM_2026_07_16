<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Marktsentiment Dashboard</title>
    <style>
        :root { --bg: #0d1117; --panel: #151b23; --panel-border: #26303b; --text: #e6edf3; --accent: #58a6ff; --green: #3fb950; --red: #e5534b; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; padding: 20px; }
        .wrap { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--panel-border); padding-bottom: 10px; margin-bottom: 20px; }
        .group-box { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .group-title { font-size: 12px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid var(--panel-border); padding-bottom: 5px; }
        .quick-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #161b22; font-size: 14px; }
        .value { font-family: monospace; }
        .positive { color: var(--green); }
        .negative { color: var(--red); }
        .fazit-box { margin-top: 10px; padding: 10px; background: #010409; border-radius: 6px; font-size: 13px; color: #8b98a5; }
        button { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>Dashboard</h1>
            <div id="controls">
                <input type="password" id="apiKey" placeholder="Gemini API Key">
                <button onclick="startDashboard()">Daten laden</button>
            </div>
        </header>

        <div class="group-box">
            <div class="group-title">Marktdaten</div>
            <div id="marketData">Lade Daten...</div>
        </div>

        <div class="group-box">
            <div class="group-title">KI-Analyse</div>
            <div id="aiAnalysis" class="fazit-box">API Key eingeben & Start drücken</div>
        </div>
    </div>

    <script>
        // --- 1. Konfiguration & API-Call mit Queue (verhindert 429 Fehler) ---
        const GEMINI_MODEL = "gemini-1.5-flash";

        async function callGemini(prompt) {
            const key = document.getElementById('apiKey').value;
            if (!key) return "Bitte API-Key eingeben.";
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        // --- 2. Daten abrufen (CoinGecko Fix) ---
        async function fetchCryptoData() {
            // WICHTIG: Korrekte URL mit /api/v3/
            const url = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true';
            const res = await fetch(url);
            return await res.json();
        }

        // --- 3. UI Rendering ---
        async function startDashboard() {
            const dataContainer = document.getElementById('marketData');
            const aiContainer = document.getElementById('aiAnalysis');
            
            dataContainer.innerHTML = "Lade Preise...";
            aiContainer.innerHTML = "Analysiere Trends...";

            try {
                // Daten holen
                const crypto = await fetchCryptoData();
                
                // UI aufbauen
                let html = "";
                for (const coin in crypto) {
                    const price = crypto[coin].usd;
                    const change = crypto[coin].usd_24h_change.toFixed(2);
                    html += `<div class="quick-row">
                        <span>${coin.toUpperCase()}</span>
                        <span class="value">$${price}</span>
                        <span class="${change >= 0 ? 'positive' : 'negative'}">${change}%</span>
                    </div>`;
                }
                dataContainer.innerHTML = html;

                // KI Analyse (Queue/Sequenziell)
                const prompt = `Analysiere kurz den Krypto-Markt basierend auf diesen Daten: ${JSON.stringify(crypto)}. Gib ein kurzes Sentiment-Fazit.`;
                aiContainer.innerHTML = "Analysiere...";
                const analysis = await callGemini(prompt);
                aiContainer.innerHTML = analysis;

            } catch (err) {
                dataContainer.innerHTML = "Fehler beim Laden: " + err.message;
            }
        }
    </script>
</body>
</html>
