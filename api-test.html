<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Gemini API Tester</title></head>
<body>
  <h2>Gemini API Key Tester</h2>
  <input type="text" id="keyInput" placeholder="API Key (AIza... oder AQ...)" style="width:300px;">
  <button onclick="testKey()">API testen</button>
  <pre id="output" style="margin-top:20px; padding:10px; border:1px solid #ccc;"></pre>

  <script>
    async function testKey() {
      const key = document.getElementById('keyInput').value.trim();
      const output = document.getElementById('output');
      const model = "gemini-2.0-flash";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

      output.textContent = "Teste Verbindung...";

      const headers = { 'Content-Type': 'application/json' };
      
      // Korrekte Header-Wahl basierend auf dem Key-Typ
      if (key.startsWith("AIza")) {
        headers['x-goog-api-key'] = key;
      } else {
        headers['Authorization'] = `Bearer ${key}`;
      }

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ contents: [{ parts: [{ text: "Hallo, bist du da?" }] }] })
        });

        const data = await response.json();
        
        if (response.ok) {
          output.style.color = "green";
          output.textContent = "✅ ERFOLG!\nAPI-Key ist gültig.\nAntwort: " + data.candidates[0].content.parts[0].text;
        } else {
          output.style.color = "red";
          output.textContent = "❌ FEHLER (" + response.status + ")\nDetails: " + JSON.stringify(data, null, 2);
        }
      } catch (err) {
        output.style.color = "red";
        output.textContent = "❌ Verbindung fehlgeschlagen: " + err.message;
      }
    }
  </script>
</body>
</html>
