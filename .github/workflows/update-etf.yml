name: ETF-Kurs aktualisieren

on:
  schedule:
    - cron: '*/30 6-21 * * 1-5'   # alle 30 Min, Mo-Fr, 6-21 Uhr UTC
  workflow_dispatch:               # manueller Start im Actions-Tab möglich

permissions:
  contents: write

jobs:
  update-etf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kurs von Stooq holen
        run: |
          curl -s -A "Mozilla/5.0" "https://stooq.com/q/l/?s=uetw.de&f=sd2t2ohlcv&h&e=csv" -o raw.csv
          cat raw.csv

      - name: CSV in JSON umwandeln
        run: |
          python3 - <<'EOF'
          import csv, json

          with open('raw.csv') as f:
              rows = list(csv.reader(f))

          if len(rows) < 2:
              raise SystemExit("Keine Daten von Stooq erhalten")

          werte = rows[1]
          open_preis = float(werte[3])
          close_preis = float(werte[6])
          aenderung = (close_preis - open_preis) / open_preis * 100

          data = {
              "price": close_preis,
              "change_percent": round(aenderung, 2),
              "updated_at": werte[1] + " " + werte[2]
          }

          with open('etf.json', 'w') as out:
              json.dump(data, out)

          print(data)
          EOF

      - name: Änderung committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add etf.json
          git diff --quiet --cached || git commit -m "ETF-Kurs aktualisiert"
          git push
